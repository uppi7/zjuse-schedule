[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    unit: 纯函数 / 单服务单测，SQLite in-memory + ASGITransport，无外部依赖
    integration: 跨服务集成（需 docker-compose.test.yml 起 MySQL/Redis/Celery）
    solver: OR-Tools solver golden case 回归，纯 Python 调用 run_schedule()
    e2e: API 级端到端，httpx 打到 docker-compose.test.yml 暴露的端口
    smoke: 关键链路冒烟（e2e 子集）
