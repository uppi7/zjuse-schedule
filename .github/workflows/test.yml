name: tests

on:
  pull_request:
  push:
    branches: [main, master, dev]

jobs:
  unit-and-solver:
    name: unit + solver (fast, no stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit + solver tests with coverage
        run: pytest -m "unit or solver" -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-solver
          path: coverage.xml
