version: "3.9"

# 本组独立开发/测试编排文件。启动命令：docker compose up --build
# 全局集成时各子系统加入同一个 app-network 即可互通。

services:

  # ── MySQL（本组测试用） ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ca_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB:-course_arrange}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"   # 3307 避免与主机 MySQL 冲突
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Redis（本组测试用） ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ca_redis
    ports:
      - "6380:6379"   # 6380 避免与主机 Redis 冲突
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # ── FastAPI 服务 ────────────────────────────────────────────────────────
  schedule-api:
    build: .
    container_name: ca_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    ports:
      - "8002:8000"   # 本组占用 8002，避免与其他子系统冲突
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app   # 开发模式热重载
    networks:
      - app-network

  # ── Celery Worker ────────────────────────────────────────────────────────
  schedule-worker:
    build: .
    container_name: ca_worker
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - app-network

  # ── 前端 Vite 开发服务 ────────────────────────────────────────────────────
  schedule-frontend:
    image: node:20-alpine
    container_name: ca_frontend
    working_dir: /app
    # 首次启动自动安装依赖，之后直接跑 dev server
    command: sh -c "npm install && npm run dev"
    environment:
      # Vite proxy 目标：容器内通过 Docker 内网名称访问 API
      VITE_API_TARGET: http://schedule-api:8000
    ports:
      - "5173:5173"   # 浏览器访问 http://localhost:5173
    depends_on:
      - schedule-api
    volumes:
      - ./frontend:/app          # 源码热重载
      - fe_node_modules:/app/node_modules  # node_modules 独立 volume，避免宿主机覆盖
    networks:
      - app-network

volumes:
  mysql_data:
  fe_node_modules:

networks:
  app-network:
    driver: bridge
