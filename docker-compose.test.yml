version: "3.9"

# 测试用隔离栈。与主 docker-compose.yml 完全独立的容器/端口/网络/数据卷，
# 启动后供 integration/e2e 层 pytest 通过暴露端口连入。
#
# 启动：docker compose -f docker-compose.test.yml up -d --wait
# 销毁：docker compose -f docker-compose.test.yml down -v
#
# 暴露端口：MySQL 3308 / Redis 6381 / FastAPI 8003
# 测试 base_url：http://localhost:8003

services:

  mysql-test:
    image: mysql:8.0
    container_name: ca_mysql_test
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: schedule_test
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-test-network

  redis-test:
    image: redis:7-alpine
    container_name: ca_redis_test
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
    networks:
      - app-test-network

  schedule-api-test:
    build: .
    container_name: ca_api_test
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      MYSQL_HOST: mysql-test
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: testpassword
      MYSQL_DB: schedule_test
      REDIS_HOST: redis-test
      REDIS_PORT: "6379"
    ports:
      - "8003:8000"
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-test-network

  schedule-worker-test:
    build: .
    container_name: ca_worker_test
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      MYSQL_HOST: mysql-test
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: testpassword
      MYSQL_DB: schedule_test
      REDIS_HOST: redis-test
      REDIS_PORT: "6379"
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - app-test-network

networks:
  app-test-network:
    driver: bridge
